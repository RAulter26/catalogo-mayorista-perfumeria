};

/* ─── CATALOG VIEW ─── */
const Catalog = ({initialCategory, onOpen, onAddQuote, quoteItems, showPrice, density}) => {
  const [q, setQ]         = React.useState('');
  const [group, setGroup] = React.useState(() => initialCategory && initialCategory !== 'all' ? menuForCategory(initialCategory) : 'all');
  const [cat, setCat]     = React.useState(initialCategory || 'all');
  const [srch, setSrch]   = React.useState(false);
  const scrollRef         = React.useRef(null);

  React.useEffect(() => {
    const nextGroup = initialCategory && initialCategory !== 'all' ? menuForCategory(initialCategory) : 'all';
    setGroup(nextGroup);
    setCat(initialCategory || 'all');
  }, [initialCategory]);

  React.useEffect(() => {
    if(scrollRef.current) scrollRef.current.scrollTo({top:0,behavior:'smooth'});
  }, [group, cat]);

  const activeMenu = menuById(group) || MENU_GROUPS[0];
  const visibleCategories = group === 'all'
    ? CATEGORIES
    : CATEGORIES.filter(c => activeMenu.cats.includes(c.id));
  const groupCount = activeMenu.cats.reduce((sum, id) => sum + (CATEGORIES.find(c => c.id === id)?.count || 0), 0);

  const filtered = React.useMemo(() => {
    const qq = q.trim().toLowerCase();
    return PRODUCTS.filter(p => {
      if(group !== 'all' && !activeMenu.cats.includes(p.cat)) return false;
      if(cat !== 'all' && p.cat !== cat) return false;
      if(!qq) return true;
      return p.name.toLowerCase().includes(qq) ||
             p.brand.toLowerCase().includes(qq) ||
             p.tagline.toLowerCase().includes(qq) ||
             p.specs.some(s=>s.toLowerCase().includes(qq));
    });
  }, [q, cat, group]);

  const catName  = cat === 'all' ? activeMenu.name : CATEGORIES.find(c=>c.id===cat)?.name;
  const headKicker = cat === 'all' ? '/ MENU COMERCIAL' : '/ SUBCATEGORIA';
  const inPedido = new Set(quoteItems.map(i=>i.id));

  return (
    <div className="catalog">
      <div className="cat-search-bar">
        <div className={"search-wrap " + (srch?'focused':'')}>
          <IconSearch size={15}/>
          <input value={q} onChange={e=>setQ(e.target.value)}
                 onFocus={()=>setSrch(true)} onBlur={()=>setSrch(false)}
                 placeholder="Buscar marca, fragancia, tipo..."/>
          {q && <button className="search-clear" onClick={()=>setQ('')}><IconClose size={13}/></button>}
        </div>
      </div>

      <div className="menu-row">
        <div className="menu-tabs">
          {MENU_GROUPS.map(m => (
            <button
              key={m.id}
              className={"menu-tab " + (group===m.id?'on':'')}
              onClick={() => { setGroup(m.id); setCat('all'); }}>
              {m.name}
              <span className="count">{m.cats.reduce((sum,id)=>sum + (CATEGORIES.find(c=>c.id===id)?.count || 0),0)}</span>
            </button>
          ))}
        </div>
      </div>

      <div className="chips-row">
        <div className="chips">
          <button className={"chip " + (cat==='all'?'on':'')} onClick={()=>setCat('all')}>
            Todas <span className="chip-count mono">{group==='all'?PRODUCTS.length:groupCount}</span>
          </button>
          {visibleCategories.map(c=>(
            <button key={c.id} className={"chip " + (cat===c.id?'on':'')} onClick={()=>setCat(c.id)}>
              {c.short} <span className="chip-count mono">{c.count}</span>
            </button>
          ))}
        </div>
      </div>

      <div className="cat-hdr">
        <div>
          <div className="kicker mono">{headKicker}</div>
          <div className="cat-hdr-title serif">{catName}</div>
        </div>
        <div className="count-badge mono">{filtered.length} {filtered.length===1?'referencia':'referencias'}</div>
      </div>

      <div ref={scrollRef} className={"grid density-" + density}>
        {filtered.length===0 && (
          <div className="empty">
            <div className="empty-mono mono">// SIN RESULTADOS</div>
            <div className="empty-title serif">Sin referencias</div>
            <div className="empty-sub">Intenta con otra busqueda o cambia la categoria.</div>
            <button className="btn ghost sm" onClick={()=>{setQ('');setGroup('all');setCat('all')}}>Limpiar filtros</button>
          </div>
        )}
        {filtered.map(p=>(
          <ProductCard key={p.id} product={p} density={density}
                       showPrice={showPrice} onOpen={onOpen}
                       onAddQuote={onAddQuote} inQuote={inPedido.has(p.id)}/>
        ))}
      </div>
    </div>
  );
};

/* ─── APP SHELL ─── */
const useLocal = (key, init) => {
  const [v,setV] = React.useState(()=>{
    try{const s=localStorage.getItem(key);return s!=null?JSON.parse(s):init;}catch{return init;}
  });
  React.useEffect(()=>{try{localStorage.setItem(key,JSON.stringify(v));}catch{}},[key,v]);
  return [v,setV];
};

const App = () => {
  const [route,       setRoute]       = useLocal('pf2.route',   {name:'home'});
  const [showPrice,   setShowPrice]   = useLocal('pf2.price',   true);
  const [density,     setDensity]     = useLocal('pf2.density', 'medium');
  const [detail,      setDetail]      = React.useState(null);
  const [settings,    setSettings]    = React.useState(false);
  const [pedido,      setPedido]      = React.useState(false);
  const [pedidoItems, setPedidoItems] = useLocal('pf2.pedido', []);
  const [flash,       setFlash]       = React.useState(null);

  React.useEffect(() => {
    try {
      const p = new URLSearchParams(window.location.search).get('precios');
      if (p === '0') setShowPrice(false);
      if (p === '1') setShowPrice(true);
    } catch {}
  }, []);

  const goHome    = () => setRoute({name:'home'});
  const goCatalog = (cat) => setRoute({name:'catalog',category:cat||'all'});

  const addToPedido = (product, options={}) => {
    const ex = pedidoItems.find(i=>i.id===product.id);
    const qty = Math.max(1, Number(options.qty || 1));
    if (options.forceAdd) {
      if (ex) {
        setPedidoItems(pedidoItems.map(i => i.id===product.id ? {...i, qty:i.qty + qty} : i));
      } else {
        setPedidoItems([...pedidoItems, {...product, qty}]);
      }
      showToast(qty > 1 ? 'Se sumaron ' + qty + ' unidades al pedido' : 'Producto agregado al pedido');
      return;
    }
    if(ex){ setPedidoItems(pedidoItems.filter(i=>i.id!==product.id)); showToast('Quitado del pedido'); }
    else  { setPedidoItems([...pedidoItems,{...product,qty:1}]);       showToast('Agregado al pedido'); }
  };
  const showToast = (msg) => {
    setFlash(msg); clearTimeout(window.__ft);
    window.__ft = setTimeout(()=>setFlash(null),1800);
  };

  const waCatalog = waLink(WA_TEMPLATES.catalogIntro);

  return (
    <div className="app">
      {/* HEADER */}
      <header className="top">
        <button className="icon-btn" onClick={()=>setSettings(true)} aria-label="Menú">
          <IconMenu size={17}/>
        </button>
        <button className="brand" onClick={goHome}>
          <div className="brand-mark">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#FAF8F4" strokeWidth="1.7" strokeLinecap="round">
              <path d="M12 2c0 0-7 9-7 13a7 7 0 0 0 14 0c0-4-7-13-7-13z"/>
              <circle cx="12" cy="15" r="2" fill="#FAF8F4" opacity=".7"/>
            </svg>
          </div>
          <div className="brand-stack">
            <div className="brand-name">{BUSINESS.brandName}</div>
            <div className="brand-sub mono">{BUSINESS.catalogBadge}</div>
          </div>
        </button>
        <div className="top-right">
          {showPrice && <div className="price-indicator">$ ON</div>}
          <a className="icon-btn" href={waCatalog} target="_blank" rel="noreferrer" title="WhatsApp">
            <IconWhatsapp size={17}/>
          </a>
          <button className="icon-btn quote-toggle" onClick={()=>setPedido(true)} aria-label="Mi pedido">
            <IconCart size={17}/>
            {pedidoItems.length>0 && <span className="badge mono">{pedidoItems.length}</span>}
          </button>
        </div>
      </header>

      {/* MAIN */}
      <main>
        {route.name==='home' && (
          <Home onGoCatalog={goCatalog} onPickCategory={goCatalog}/>
        )}
        {route.name==='catalog' && (
          <>
            <div className="subnav">
              <button className="back-link" onClick={goHome}><IconBack size={13}/> Inicio</button>
              <span className="sep">·</span>
              <span className="crumb mono">CATÁLOGO</span>
            </div>
            <Catalog
              initialCategory={route.category}
              onOpen={setDetail}
              onAddQuote={addToPedido}
              quoteItems={pedidoItems}
              showPrice={showPrice}
              density={density}
            />
          </>
        )}
      </main>

      {/* OVERLAYS */}
      <DetailSheet product={detail} onClose={()=>setDetail(null)}
                   onAddQuote={addToPedido}
                   inQuote={!!pedidoItems.find(i=>i.id===detail?.id)}
                   showPrice={showPrice}
                   onOpenProduct={setDetail}/>
      <SettingsDrawer open={settings} onClose={()=>setSettings(false)}
                      showPrice={showPrice} setShowPrice={setShowPrice}
                      density={density} setDensity={setDensity}/>
      <PedidoDrawer open={pedido} onClose={()=>setPedido(false)}
                    items={pedidoItems} setItems={setPedidoItems}
                    showPrice={showPrice} showToast={showToast}/>

      {pedidoItems.length>0 && !pedido && !detail && (
        <button className="fab" onClick={()=>setPedido(true)}>
          <IconCart size={16}/> <span>Mi pedido</span>
          <span className="mono" style={{opacity:.7}}>· {pedidoItems.length}</span>
        </button>
      )}

      <a className="wa-float" href={waCatalog} target="_blank" rel="noreferrer" aria-label="WhatsApp">
        <IconWhatsapp size={20}/>
        <span>{COPY.floatWaLabel}</span>
      </a>

      {flash && <div className="flash mono">{flash}</div>}
    </div>
  );
};

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
