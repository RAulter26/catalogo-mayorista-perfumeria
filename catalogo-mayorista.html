<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover"/>
<meta name="theme-color" content="#FAF8F4"/>
<meta name="description" content="Catálogo Mayorista de Fragancias — Perfumes mujer, hombre, unisex, niños, splash, corporales y sets. Distribución mayorista. Contacto por WhatsApp."/>
<meta property="og:title" content="Perfumería · Catálogo Mayorista 2026"/>
<title>Perfumería · Catálogo Mayorista</title>

<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet"/>

<style>
/* ═══════════════════════════════════════════════════════
   PERFUMERÍA MAYORISTA · Catálogo 2026
   Paleta crema cálida · acento marrón-rojo · serif elegante
═══════════════════════════════════════════════════════ */
:root {
  --bg-0: #FAF8F4;
  --bg-1: #F3EFE7;
  --bg-2: #EBE5D8;
  --bg-3: #E0D9C9;
  --line: #D4CCBB;
  --line-soft: #EAE4D8;
  --fg: #1C1812;
  --fg-1: #4A4238;
  --fg-2: #7A7064;
  --fg-3: #A89E90;
  --accent: #8B5A3E;
  --accent-2: #704830;
  --accent-soft: rgba(139,90,62,.09);
  --accent-glow: rgba(139,90,62,.18);
  --gold: #A07830;
  --gold-soft: rgba(160,120,48,.10);
  --gold-line: rgba(160,120,48,.30);
  --wa: #25D366;
  --wa-dark: #1aaa52;
  --wa-soft: rgba(37,211,102,.10);
  --r: 12px;
  --r-lg: 18px;
  --r-xl: 28px;
  --f-display: 'Cormorant Garamond', Georgia, serif;
  --f-ui: 'Inter', system-ui, sans-serif;
  --f-mono: 'JetBrains Mono', ui-monospace, monospace;
  --sh-sm: 0 1px 3px rgba(0,0,0,.07),0 1px 2px rgba(0,0,0,.05);
  --sh: 0 4px 12px rgba(0,0,0,.08),0 2px 4px rgba(0,0,0,.05);
  --sh-lg: 0 20px 48px rgba(0,0,0,.14),0 8px 16px rgba(0,0,0,.08);
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{margin:0;padding:0;background:var(--bg-0);color:var(--fg);font-family:var(--f-ui)}
body{font-size:15px;line-height:1.55;-webkit-font-smoothing:antialiased;text-rendering:optimizeLegibility}
button{font-family:inherit;color:inherit;background:none;border:0;cursor:pointer;padding:0}
a{color:inherit;text-decoration:none}
input{font-family:inherit}
img{display:block}
.mono{font-family:var(--f-mono);letter-spacing:.02em}
.serif{font-family:var(--f-display)}
.muted{color:var(--fg-2)}
.dim{color:var(--fg-3)}
.tiny{font-size:11px}

/* ── APP ── */
.app{min-height:100vh;max-width:1280px;margin:0 auto;padding-bottom:80px}

/* ── HEADER ── */
.top{
  position:sticky;top:0;z-index:30;
  display:flex;align-items:center;gap:12px;
  padding:13px 20px;
  background:rgba(250,248,244,.93);
  backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
  border-bottom:1px solid var(--line-soft);
}
.brand{display:flex;align-items:center;gap:11px;margin:0 auto 0 6px;cursor:pointer;background:none;border:none}
.brand-mark{
  width:36px;height:36px;border-radius:10px;
  background:var(--accent);
  display:flex;align-items:center;justify-content:center;flex-shrink:0;
}
.brand-stack{display:flex;flex-direction:column;align-items:flex-start;line-height:1}
.brand-name{font-family:var(--f-display);font-size:16px;font-weight:600;letter-spacing:.04em;color:var(--fg)}
.brand-sub{font-family:var(--f-mono);font-size:9px;color:var(--fg-3);margin-top:3px;letter-spacing:.12em}
.top-right{display:flex;align-items:center;gap:8px;margin-left:auto}
.icon-btn{
  width:40px;height:40px;display:grid;place-items:center;
  border-radius:10px;color:var(--fg-2);
  border:1px solid var(--line-soft);background:var(--bg-0);
  transition:all .15s;
}
.icon-btn:hover{background:var(--bg-1);color:var(--fg);border-color:var(--line)}
.quote-toggle{position:relative}
.badge{
  position:absolute;top:-6px;right:-6px;
  min-width:17px;height:17px;padding:0 4px;
  border-radius:9px;background:var(--accent);color:#FAF8F4;
  font-size:9.5px;font-weight:700;display:grid;place-items:center;
}
.price-indicator{
  font-size:10px;font-weight:600;padding:3px 8px;border-radius:6px;
  background:var(--accent-soft);color:var(--accent);
  border:1px solid rgba(139,90,62,.22);letter-spacing:.06em;
  font-family:var(--f-mono);
}
.subnav{
  display:flex;align-items:center;gap:8px;
  padding:14px 22px 0;color:var(--fg-3);font-size:12px;
}
.back-link{display:inline-flex;align-items:center;gap:5px;color:var(--fg-2);transition:color .15s;background:none;border:none;cursor:pointer;font-family:inherit;font-size:inherit}
.back-link:hover{color:var(--accent)}
.sep{color:var(--fg-3)}
.crumb{font-family:var(--f-mono);font-size:10px;color:var(--fg-3);letter-spacing:.12em}

/* ── BUTTONS ── */
.btn{
  display:inline-flex;align-items:center;gap:8px;
  padding:12px 20px;border-radius:10px;
  font-size:14px;font-weight:500;letter-spacing:.01em;
  border:1px solid transparent;transition:all .15s;cursor:pointer;
}
.btn.sm{padding:9px 14px;font-size:13px;border-radius:8px}
.btn.primary{background:var(--accent);color:#FAF8F4;box-shadow:0 1px 0 var(--accent-2),0 4px 14px rgba(139,90,62,.25)}
.btn.primary:hover{background:var(--accent-2);transform:translateY(-1px)}
.btn.ghost{background:transparent;color:var(--fg-1);border-color:var(--line)}
.btn.ghost:hover{background:var(--bg-1);color:var(--fg);border-color:var(--line)}
.btn.solid{background:var(--bg-1);color:var(--fg);border-color:var(--line)}
.btn.solid.added{background:var(--accent-soft);border-color:rgba(139,90,62,.3);color:var(--accent)}
.btn.whatsapp{background:var(--wa);color:#fff;border-color:var(--wa)}
.btn.whatsapp:hover{background:var(--wa-dark);transform:translateY(-1px)}
.btn.flex{flex:1;justify-content:center}

/* ── SECTION HEADS ── */
.sec-head{margin-bottom:28px}
.sec-kicker{font-family:var(--f-mono);font-size:10.5px;color:var(--fg-3);letter-spacing:.18em;margin-bottom:10px}
.sec-title{font-family:var(--f-display);font-size:clamp(28px,4vw,42px);font-weight:600;letter-spacing:-.01em;margin:0;line-height:1.05}
.sec-title em{font-style:italic;color:var(--accent)}

/* ── HOME ── */
.home{padding:20px 22px 40px;display:flex;flex-direction:column;gap:60px}

/* ── HERO ── */
.hero{
  position:relative;overflow:hidden;border-radius:var(--r-xl);
  background:linear-gradient(135deg,#1C1812 0%,#2e2218 50%,#3a2820 100%);
  padding:60px 36px 36px;color:#FAF8F4;
}
.hero::after{
  content:'';position:absolute;right:-90px;top:-90px;width:260px;height:260px;border-radius:50%;
  background:radial-gradient(circle,rgba(255,255,255,.22) 0%,rgba(255,255,255,0) 70%);
  pointer-events:none;
}
.hero-pattern{
  position:absolute;inset:0;pointer-events:none;
  background-image:radial-gradient(circle at 70% 20%,rgba(139,90,62,.25) 0%,transparent 50%),
    radial-gradient(circle at 10% 80%,rgba(160,120,48,.15) 0%,transparent 40%);
}
.hero-lines{
  position:absolute;inset:0;pointer-events:none;opacity:.07;
  background-image:repeating-linear-gradient(0deg,transparent,transparent 48px,rgba(255,255,255,.5) 48px,rgba(255,255,255,.5) 49px),
    repeating-linear-gradient(90deg,transparent,transparent 48px,rgba(255,255,255,.5) 48px,rgba(255,255,255,.5) 49px);
}
.hero-eyebrow{
  position:relative;display:inline-flex;align-items:center;gap:10px;
  font-family:var(--f-mono);font-size:10.5px;color:rgba(250,248,244,.75);letter-spacing:.16em;
  padding:7px 14px;border-radius:999px;
  background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.14);margin-bottom:24px;
}
.hero-eyebrow .dot{width:6px;height:6px;border-radius:50%;background:var(--gold);animation:blink 2s ease-in-out infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.35}}
.hero-title{
  position:relative;font-family:var(--f-display);
  font-size:clamp(44px,8vw,88px);font-weight:600;letter-spacing:-.02em;
  line-height:.94;margin:0 0 18px;color:#FAF8F4;
}
.hero-title em{font-style:italic;color:var(--gold)}
.hero-sub{position:relative;color:rgba(250,248,244,.72);max-width:520px;font-size:clamp(15px,1.8vw,18px);margin:0 0 32px;line-height:1.6}
.hero-ctas{position:relative;display:flex;flex-wrap:wrap;gap:10px;margin-bottom:44px}
.hero-ctas .btn.primary{background:var(--gold);border-color:var(--gold);color:#1C1812}
.hero-ctas .btn.primary:hover{background:#8a6420}
.hero-ctas .btn.ghost{border-color:rgba(255,255,255,.22);color:rgba(250,248,244,.85)}
.hero-ctas .btn.ghost:hover{background:rgba(255,255,255,.10);color:#FAF8F4}
.hero-stats{
  position:relative;display:grid;grid-template-columns:repeat(3,1fr);gap:16px;
  padding-top:28px;border-top:1px solid rgba(255,255,255,.12);
}
.hero-stats>div{display:flex;flex-direction:column;gap:3px}
.hero-stats .num{font-family:var(--f-display);font-size:28px;font-weight:600;color:#FAF8F4;letter-spacing:-.01em}
.hero-stats .lbl{font-size:12px;color:rgba(250,248,244,.55);letter-spacing:.02em}

/* ── MEGA EXPLORER ── */
.mega-shell{
  position:relative;z-index:10;
  border-radius:var(--r-xl);border:1px solid var(--line-soft);
  background:linear-gradient(180deg,#fff 0%,#f9f4ea 100%);box-shadow:var(--sh);
}
.mega-top{display:flex;align-items:center;gap:8px;padding:16px 18px;overflow-x:auto;-webkit-overflow-scrolling:touch}
.mega-top::-webkit-scrollbar{display:none}
.mega-top-hint{font-family:var(--f-mono);font-size:10px;color:var(--fg-3);letter-spacing:.12em;margin-left:auto;white-space:nowrap;padding:0 6px;user-select:none}
.mega-tab{
  display:inline-flex;align-items:center;gap:8px;white-space:nowrap;
  padding:10px 14px;border-radius:999px;border:1px solid var(--line);
  background:rgba(255,255,255,.76);color:var(--fg-2);font-size:12.5px;font-weight:600;transition:all .16s;cursor:pointer;
}
.mega-tab:hover{border-color:var(--accent);color:var(--fg);background:rgba(255,255,255,.98)}
.mega-tab.on{background:var(--fg);color:#fff;border-color:var(--fg)}
.mega-panel{
  position:absolute;top:calc(100% - 1px);left:-1px;right:-1px;z-index:30;
  display:grid;grid-template-columns:1.15fr 1fr 1fr 1fr 1.05fr;gap:24px;
  padding:22px 20px 20px;
  background:linear-gradient(180deg,#fff 0%,#f9f4ea 100%);
  border:1px solid var(--line-soft);border-top:none;
  border-radius:0 0 var(--r-xl) var(--r-xl);
  box-shadow:0 20px 48px rgba(0,0,0,.14),0 8px 16px rgba(0,0,0,.08);
  animation:megaSlide .2s cubic-bezier(.22,.8,.2,1);
  min-height:280px;
}
@keyframes megaSlide{from{opacity:0;transform:translateY(-8px)}to{opacity:1;transform:translateY(0)}}
.mega-col{display:flex;flex-direction:column;gap:10px}
.mega-col-title{font-size:12px;font-weight:700;letter-spacing:.04em;color:var(--fg);text-transform:uppercase}
.mega-link{font-size:14px;color:var(--fg-2);text-align:left;transition:all .16s;padding:0;border:0;background:none}
.mega-link:hover{color:var(--accent);transform:translateX(2px)}
.mega-spot{
  border-radius:22px;background:linear-gradient(180deg,#f7f1e7 0%,#eee5d7 100%);
  border:1px solid rgba(160,120,48,.18);padding:16px;display:flex;flex-direction:column;justify-content:space-between;min-height:240px;
}
.mega-spot-media{height:132px;border-radius:18px;background:#fff;display:flex;align-items:center;justify-content:center;overflow:hidden;box-shadow:inset 0 0 0 1px rgba(212,204,187,.7)}
.mega-spot-media img{max-width:82%;max-height:82%;object-fit:contain;filter:drop-shadow(0 12px 20px rgba(60,46,34,.18))}
.mega-spot-kicker{font-family:var(--f-mono);font-size:10px;letter-spacing:.16em;color:var(--fg-3);margin-top:12px}
.mega-spot-name{font-family:var(--f-display);font-size:28px;line-height:.96;margin:8px 0 8px;color:var(--fg)}
.mega-spot-copy{font-size:13px;color:var(--fg-2);line-height:1.55;margin-bottom:12px}
.mega-spot-price{font-size:12px;color:var(--fg-2)}
.mega-spot-price strong{font-size:22px;color:var(--accent);font-family:var(--f-display)}
.mega-spot-cta{margin-top:14px}

/* ── CATEGORIES ── */
.cats-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:14px}
.cat-card{
  display:flex;flex-direction:column;gap:12px;
  padding:22px 18px 20px;border-radius:var(--r-lg);
  border:1px solid var(--line-soft);
  background:linear-gradient(180deg,#fff 0%,#f8f2e8 100%);
  text-align:left;transition:all .18s;cursor:pointer;box-shadow:var(--sh-sm);
}
.cat-card:hover{border-color:var(--accent);box-shadow:var(--sh);transform:translateY(-2px)}
.cat-num{font-size:10px;color:var(--fg-3);letter-spacing:.16em}
.cat-glyph{
  color:var(--accent);opacity:.9;width:44px;height:44px;border-radius:12px;
  display:flex;align-items:center;justify-content:center;
  background:rgba(139,90,62,.08);border:1px solid rgba(139,90,62,.18);
}
.cat-name{font-size:13.5px;font-weight:500;color:var(--fg);line-height:1.3}
.cat-meta{font-size:10px;color:var(--fg-3);letter-spacing:.1em}

/* ── WHOLESALE BLOCK ── */
.wholesale{
  border-radius:var(--r-xl);
  background:linear-gradient(135deg,var(--accent) 0%,var(--accent-2) 100%);
  padding:48px 40px;color:#FAF8F4;position:relative;overflow:hidden;
}
.wholesale::before{content:'';position:absolute;top:-40px;right:-40px;width:220px;height:220px;border-radius:50%;background:rgba(255,255,255,.06);pointer-events:none}
.wholesale::after{content:'';position:absolute;bottom:-60px;left:20px;width:180px;height:180px;border-radius:50%;background:rgba(0,0,0,.08);pointer-events:none}
.ws-header{position:relative;margin-bottom:32px}
.ws-eyebrow{font-family:var(--f-mono);font-size:10px;color:rgba(250,248,244,.6);letter-spacing:.18em;margin-bottom:10px}
.ws-title{font-family:var(--f-display);font-size:clamp(28px,4vw,44px);font-weight:600;letter-spacing:-.01em;color:#FAF8F4;margin:0 0 10px}
.ws-sub{color:rgba(250,248,244,.75);font-size:clamp(14px,1.6vw,16px);max-width:480px;line-height:1.6}
.ws-cards{position:relative;display:grid;grid-template-columns:repeat(3,1fr);gap:16px;margin-bottom:32px}
.ws-card{background:rgba(255,255,255,.10);border:1px solid rgba(255,255,255,.16);border-radius:var(--r);padding:20px}
.ws-card-icon{width:36px;height:36px;border-radius:9px;background:rgba(255,255,255,.15);display:flex;align-items:center;justify-content:center;margin-bottom:12px;color:#FAF8F4}
.ws-card-title{font-weight:600;font-size:14px;margin-bottom:5px;color:#FAF8F4}
.ws-card-text{font-size:12.5px;color:rgba(250,248,244,.72);line-height:1.5}
.ws-cta{position:relative;display:flex;flex-wrap:wrap;gap:10px;align-items:center}
.ws-note{font-size:13px;color:rgba(250,248,244,.60);font-style:italic}

/* ── FEATURED ── */
.featured-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:16px}
.feat-card{
  position:relative;border-radius:var(--r-lg);overflow:hidden;
  aspect-ratio:3/4;border:1px solid var(--line-soft);background:var(--bg-1);
  cursor:pointer;transition:all .2s;box-shadow:var(--sh-sm);
}
.feat-card:hover{transform:translateY(-3px);box-shadow:var(--sh)}
.feat-img{width:100%;height:100%;display:flex;align-items:center;justify-content:center;overflow:hidden}
.feat-img .img-stage::before{inset:12px}
.feat-over{
  position:absolute;bottom:0;left:0;right:0;padding:16px;
  background:linear-gradient(to top,rgba(28,24,18,.88),transparent);color:#FAF8F4;
}
.feat-cat{font-family:var(--f-mono);font-size:9px;letter-spacing:.16em;opacity:.7;margin-bottom:4px}
.feat-name{font-family:var(--f-display);font-size:17px;font-weight:500;line-height:1.2}

/* ── HOME FOOTER ── */
.home-foot{padding-top:40px;border-top:1px solid var(--line-soft)}
.foot-row{display:flex;align-items:center;justify-content:space-between;gap:16px;flex-wrap:wrap}
.foot-brand{font-family:var(--f-display);font-size:20px;font-weight:600;color:var(--fg)}
.foot-sub{font-size:12.5px;color:var(--fg-2);margin-top:3px}
.foot-contact{display:flex;flex-direction:column;gap:6px;text-align:right}
.foot-contact-line{font-size:12.5px;color:var(--fg-2)}
.foot-contact-line span{color:var(--fg-1);font-weight:500}

/* ── CATALOG ── */
.catalog{padding:16px 0 0}
.cat-search-bar{padding:10px 22px}
.search-wrap{
  display:flex;align-items:center;gap:10px;
  background:var(--bg-0);border:1px solid var(--line);border-radius:10px;padding:11px 14px;transition:border-color .15s;
}
.search-wrap.focused{border-color:var(--accent)}
.search-wrap svg{color:var(--fg-3);flex-shrink:0}
.search-wrap input{flex:1;border:none;outline:none;background:transparent;font-size:14px;color:var(--fg)}
.search-wrap input::placeholder{color:var(--fg-3)}
.search-clear{color:var(--fg-3);display:flex;align-items:center;cursor:pointer;background:none;border:none}
.search-clear:hover{color:var(--fg)}
.menu-row{padding:12px 22px 0;overflow-x:auto;-webkit-overflow-scrolling:touch}
.menu-row::-webkit-scrollbar{display:none}
.menu-tabs{display:flex;gap:8px;width:max-content}
.menu-tab{
  display:inline-flex;align-items:center;gap:8px;padding:9px 14px;border-radius:999px;
  font-size:12px;font-weight:600;letter-spacing:.04em;text-transform:uppercase;
  border:1px solid var(--line);background:linear-gradient(180deg,#fff 0%,#f7f0e4 100%);
  color:var(--fg-2);white-space:nowrap;transition:all .18s;cursor:pointer;
}
.menu-tab:hover{border-color:var(--accent);color:var(--fg);transform:translateY(-1px)}
.menu-tab.on{
  background:linear-gradient(135deg,var(--accent) 0%,var(--accent-2) 100%);
  border-color:var(--accent);color:#FAF8F4;box-shadow:0 8px 18px rgba(139,90,62,.26);
}
.menu-tab .count{font-family:var(--f-mono);font-size:10px;opacity:.72}
.chips-row{padding:12px 22px 0;overflow-x:auto;-webkit-overflow-scrolling:touch}
.chips-row::-webkit-scrollbar{display:none}
.chips{display:flex;gap:7px;width:max-content}
.chip{
  display:inline-flex;align-items:center;gap:5px;padding:8px 14px;border-radius:999px;
  font-size:12.5px;font-weight:500;background:var(--bg-0);color:var(--fg-2);
  border:1px solid var(--line);white-space:nowrap;transition:all .15s;cursor:pointer;
}
.chip:hover{border-color:var(--accent);color:var(--fg)}
.chip.on{background:var(--accent);border-color:var(--accent);color:#FAF8F4}
.chip-count{font-family:var(--f-mono);font-size:10px;opacity:.65}
.chip.on .chip-count{opacity:.8}
.cat-hdr{display:flex;align-items:flex-end;justify-content:space-between;padding:20px 22px 12px}
.cat-hdr .kicker{font-family:var(--f-mono);font-size:10px;color:var(--fg-3);letter-spacing:.16em;margin-bottom:5px}
.cat-hdr-title{font-family:var(--f-display);font-size:26px;font-weight:600;letter-spacing:-.01em}
.count-badge{font-family:var(--f-mono);font-size:11px;color:var(--fg-3);letter-spacing:.08em}

/* ── PRODUCT GRID ── */
.grid{padding:16px 22px 20px}
.grid.density-large{display:grid;grid-template-columns:repeat(3,1fr);gap:18px}
.grid.density-medium{display:grid;grid-template-columns:repeat(4,1fr);gap:14px}
.grid.density-list{display:flex;flex-direction:column;gap:10px}

/* ── PRODUCT CARD ── */
.card{border-radius:var(--r);border:1px solid var(--line-soft);background:var(--bg-0);overflow:hidden;transition:all .18s;box-shadow:var(--sh-sm)}
.card:hover{border-color:var(--line);box-shadow:var(--sh);transform:translateY(-1px)}
.card-img-wrap{display:block;width:100%;cursor:pointer;background:none;border:none;padding:0;text-align:left}
.card-img{width:100%;aspect-ratio:1;display:flex;align-items:center;justify-content:center;overflow:hidden;background:var(--bg-1);position:relative}
.card.large .card-img{aspect-ratio:3/4}
.img-stage{
  width:100%;height:100%;position:relative;
  display:flex;align-items:center;justify-content:center;overflow:hidden;
  background:
    radial-gradient(120% 70% at 50% -10%,rgba(160,120,48,.18),rgba(160,120,48,0) 58%),
    linear-gradient(180deg,#f8f3eb 0%,#efe7da 70%,#e4d6c4 100%);
}
.img-stage::before{
  content:'';position:absolute;inset:10px;border-radius:12px;
  border:1px solid rgba(139,90,62,.16);pointer-events:none;
}
.img-stage::after{
  content:'';position:absolute;inset:0;pointer-events:none;
  background:linear-gradient(180deg,rgba(255,255,255,.24) 0%,rgba(255,255,255,0) 38%,rgba(28,24,18,.08) 100%);
}
.img-stage.compact::before{inset:4px;border-radius:7px}
.img-stage.tall::before{inset:12px;border-radius:16px}
.prod-photo{
  width:100%;height:100%;position:relative;z-index:1;
  object-fit:cover;object-position:center 42%;
  transform:scale(1.08);
  transition:transform .42s cubic-bezier(.2,.7,.2,1), filter .3s ease;
  filter:drop-shadow(0 10px 18px rgba(28,24,18,.22));
}
.img-stage.surface-catalog .prod-photo{transform:scale(1.08)}
.img-stage.surface-featured .prod-photo{transform:scale(1.14);object-position:center 40%}
.img-stage.surface-detail .prod-photo{transform:scale(1.12);object-position:center 39%}
.img-stage.surface-thumb .prod-photo{transform:scale(1.18);object-position:center 43%}
.img-stage.surface-catalog.tall .prod-photo{transform:scale(1.12)}
.card:hover .img-stage.surface-catalog .prod-photo{transform:scale(1.18);filter:drop-shadow(0 14px 24px rgba(28,24,18,.26))}
.card-cat-pill{
  position:absolute;top:10px;left:10px;
  display:inline-flex;align-items:center;gap:4px;
  font-family:var(--f-mono);font-size:9px;letter-spacing:.12em;
  background:rgba(250,248,244,.90);color:var(--fg-2);
  padding:4px 9px;border-radius:999px;border:1px solid var(--line-soft);
}
.card-stock-pill{
  position:absolute;top:10px;right:10px;
  font-family:var(--f-mono);font-size:8.5px;letter-spacing:.12em;
  color:rgba(250,248,244,.85);background:rgba(28,24,18,.58);
  padding:4px 8px;border-radius:999px;border:1px solid rgba(250,248,244,.2);
}
.card-img-meta{
  position:absolute;left:10px;right:10px;bottom:10px;
  display:flex;align-items:center;justify-content:space-between;gap:8px;
  padding:6px 8px;border-radius:8px;
  background:rgba(28,24,18,.5);border:1px solid rgba(250,248,244,.2);
  color:rgba(250,248,244,.84);font-family:var(--f-mono);font-size:9px;letter-spacing:.08em;
  transition:transform .25s ease,opacity .25s ease;
}
.card-img-meta span:last-child{opacity:.75}
.card-hover-cta{
  position:absolute;left:10px;right:10px;bottom:10px;
  display:flex;align-items:center;justify-content:space-between;gap:8px;
  padding:8px 10px;border-radius:9px;
  background:rgba(250,248,244,.96);color:var(--fg);
  border:1px solid rgba(139,90,62,.24);
  font-family:var(--f-mono);font-size:9.5px;letter-spacing:.09em;text-transform:uppercase;
  box-shadow:0 8px 16px rgba(0,0,0,.15);
  opacity:0;transform:translateY(8px);transition:all .24s ease;
}
.card:hover .card-hover-cta{opacity:1;transform:translateY(0)}
.card:hover .card-img-meta{opacity:0;transform:translateY(8px)}
.card-body{padding:13px 14px 14px}
.card-cat{font-family:var(--f-mono);font-size:9.5px;color:var(--fg-3);letter-spacing:.14em;margin-bottom:5px}
.card-name{font-family:var(--f-display);font-size:17px;font-weight:500;line-height:1.2;margin-bottom:4px;color:var(--fg)}
.card-tag{font-size:12px;color:var(--fg-2);line-height:1.4;margin-bottom:10px}
.card-foot{display:flex;align-items:center;justify-content:space-between;gap:8px}
.card-price{font-family:var(--f-mono);font-size:12.5px;color:var(--fg-1)}
.card-price.muted{color:var(--fg-3);font-style:italic}
.quote-btn{
  width:32px;height:32px;border-radius:8px;display:grid;place-items:center;
  background:var(--bg-1);color:var(--fg-2);border:1px solid var(--line-soft);flex-shrink:0;transition:all .15s;
}
.quote-btn:hover,.quote-btn.on{background:var(--accent-soft);border-color:rgba(139,90,62,.3);color:var(--accent)}
/* LIST */
.card.list{display:flex;align-items:center;padding:0;cursor:pointer;border-radius:var(--r)}
.card.list .card-img{width:64px;height:64px;aspect-ratio:1;border-radius:var(--r) 0 0 var(--r);flex-shrink:0}
.card.list .card-body{flex:1;padding:12px 14px;display:flex;align-items:center;gap:12px}
.card.list .card-name{font-size:14px;font-weight:500;margin:0;flex:1;font-family:var(--f-display)}
.card.list .card-cat{font-size:9px;margin:0 0 3px}
.card.list .card-price{font-size:11.5px}
.card.list .card-arrow{padding:0 14px;color:var(--fg-3);flex-shrink:0}

/* ── EMPTY ── */
.empty{text-align:center;padding:64px 24px;grid-column:1/-1}
.empty-mono{font-family:var(--f-mono);font-size:10px;color:var(--fg-3);letter-spacing:.18em;margin-bottom:14px}
.empty-title{font-family:var(--f-display);font-size:26px;font-weight:500;margin-bottom:8px}
.empty-sub{font-size:14px;color:var(--fg-2);max-width:300px;margin:0 auto 20px}

/* ── DETAIL SHEET ── */
.sheet-root{
  position:fixed;inset:0;z-index:50;
  background:rgba(28,24,18,.6);backdrop-filter:blur(4px);-webkit-backdrop-filter:blur(4px);
  display:flex;align-items:flex-end;animation:fadeIn .2s ease;
}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
.sheet{
  width:100%;max-height:92vh;background:var(--bg-0);
  border-radius:24px 24px 0 0;overflow-y:auto;
  animation:slideUp .28s cubic-bezier(.22,.8,.2,1);
}
@keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
.sheet-grip-wrap{display:flex;justify-content:center;padding:14px 0 8px;cursor:grab}
.sheet-grip{width:38px;height:4px;border-radius:2px;background:var(--line)}
.sheet-close{
  position:absolute;top:14px;right:16px;width:36px;height:36px;border-radius:9px;
  display:grid;place-items:center;background:var(--bg-1);color:var(--fg-2);border:1px solid var(--line-soft);
}
.sheet-close:hover{background:var(--bg-2);color:var(--fg)}
.sheet-content{position:relative}
.sheet-hero{
  width:100%;aspect-ratio:4/3;max-height:280px;overflow:hidden;background:var(--bg-1);
  display:flex;align-items:center;justify-content:center;position:relative;
}
.sheet-hero .img-stage::before{inset:16px;border-radius:14px}
.sheet-hero::after{
  content:'';position:absolute;inset:0;pointer-events:none;
  background:linear-gradient(180deg,rgba(255,255,255,.08) 0%,rgba(28,24,18,.08) 100%);
}
.sheet-cat{
  position:absolute;bottom:12px;left:14px;
  font-family:var(--f-mono);font-size:9.5px;letter-spacing:.14em;
  color:rgba(250,248,244,.8);background:rgba(28,24,18,.65);padding:4px 10px;border-radius:999px;
}
.sheet-id{position:absolute;bottom:12px;right:14px;font-family:var(--f-mono);font-size:9px;color:rgba(250,248,244,.55)}
.sheet-body{padding:22px 20px 12px}
.sheet-name{font-family:var(--f-display);font-size:28px;font-weight:600;letter-spacing:-.01em;margin:0 0 8px}
.sheet-brand{font-family:var(--f-mono);font-size:11px;color:var(--fg-3);letter-spacing:.14em;margin-bottom:6px}
.sheet-tag{font-size:15px;color:var(--fg-2);margin:0 0 20px;line-height:1.5}
.sheet-price-row{
  display:flex;align-items:center;justify-content:space-between;
  padding:14px 16px;border-radius:10px;background:var(--bg-1);border:1px solid var(--line-soft);margin-bottom:20px;gap:12px;
}
.sheet-price-label{font-family:var(--f-mono);font-size:9.5px;color:var(--fg-3);letter-spacing:.14em;margin-bottom:4px}
.sheet-price{font-family:var(--f-display);font-size:26px;font-weight:600;color:var(--fg)}
.sheet-price.muted{font-size:20px;font-style:italic;color:var(--fg-2)}
.sheet-price-note{font-size:12px;color:var(--fg-2);text-align:right;line-height:1.5;max-width:160px}
.sheet-specs{margin-bottom:20px}
.sheet-specs-hdr{font-family:var(--f-mono);font-size:9.5px;letter-spacing:.16em;color:var(--fg-3);margin-bottom:12px}
.sheet-specs ul{list-style:none;margin:0;padding:0;display:flex;flex-direction:column;gap:8px}
.sheet-specs li{display:flex;gap:12px;align-items:baseline;font-size:13.5px;color:var(--fg-1);padding-bottom:8px;border-bottom:1px solid var(--line-soft)}
.sheet-specs li:last-child{border-bottom:0;padding-bottom:0}
.sheet-specs li span:first-child{min-width:28px;color:var(--fg-3);font-size:10.5px;text-align:right;flex-shrink:0}
.sheet-actions{padding:0 20px 28px;display:flex;flex-direction:column;gap:10px}

.sheet-layout{display:grid;gap:18px;padding:0 20px 10px}
.sheet-main{display:flex;flex-direction:column;gap:16px}
.sheet-aside{display:flex;flex-direction:column;gap:14px}
.sheet-media-card{
  position:relative;overflow:hidden;border-radius:20px;background:var(--bg-1);
  border:1px solid var(--line-soft);box-shadow:var(--sh-sm);
}
.sheet-media-card .sheet-hero{max-height:none;aspect-ratio:1.02;background:linear-gradient(180deg,#f9f3ea 0%,#efe7d8 100%)}
.sheet-media-card .sheet-hero .img-stage::before{inset:18px;border-radius:18px}
.sheet-media-badge{
  position:absolute;top:14px;left:14px;z-index:3;padding:6px 10px;border-radius:999px;
  background:rgba(250,248,244,.94);border:1px solid rgba(139,90,62,.18);
  font-family:var(--f-mono);font-size:9px;letter-spacing:.14em;color:var(--accent);
}
.sheet-media-footer{
  display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:10px;padding:14px 16px 16px;
  background:linear-gradient(180deg,rgba(255,255,255,.72) 0%,rgba(250,248,244,.96) 100%);
}
.sheet-mini-card{
  padding:10px 10px 9px;border-radius:12px;background:#fff;border:1px solid var(--line-soft);
  min-height:72px;display:flex;flex-direction:column;justify-content:space-between;
}
.sheet-mini-label{font-family:var(--f-mono);font-size:9px;letter-spacing:.14em;color:var(--fg-3)}
.sheet-mini-value{font-family:var(--f-display);font-size:17px;line-height:1.15;color:var(--fg)}
.sheet-mini-sub{font-size:11px;color:var(--fg-2)}
.sheet-buy-card{
  border-radius:20px;border:1px solid var(--line-soft);background:linear-gradient(180deg,#fff 0%,#fbf7ef 100%);
  padding:20px 18px;box-shadow:var(--sh-sm);
}
.sheet-buy-top{display:flex;align-items:flex-start;justify-content:space-between;gap:14px}
.sheet-kicker{font-family:var(--f-mono);font-size:10px;letter-spacing:.18em;color:var(--fg-3);margin-bottom:7px}
.sheet-collection{display:flex;flex-wrap:wrap;gap:8px;margin:12px 0 2px}
.sheet-chip{
  padding:6px 10px;border-radius:999px;border:1px solid var(--line);
  background:var(--bg-0);font-family:var(--f-mono);font-size:10px;letter-spacing:.08em;color:var(--fg-2);
}
.sheet-product-ref{
  min-width:78px;padding:10px 12px;border-radius:14px;background:var(--accent-soft);
  border:1px solid rgba(139,90,62,.18);text-align:right;
}
.sheet-product-ref .mono{font-size:9px;color:var(--fg-3);display:block;margin-bottom:4px}
.sheet-product-ref strong{font-family:var(--f-display);font-size:18px;color:var(--accent)}
.sheet-price-box{
  display:grid;grid-template-columns:1fr auto;gap:14px;align-items:flex-end;
  padding:14px 16px;border-radius:16px;background:#fff;border:1px solid var(--line-soft);margin:14px 0 0;
}
.sheet-price-box .sheet-price{margin:0}
.sheet-price-box .sheet-price-note{text-align:right;max-width:none}
.sheet-actions-stack{display:flex;flex-direction:column;gap:10px;margin-top:14px}
.sheet-action-row{display:flex;gap:10px;align-items:center}
.qty.big{padding:2px;background:#fff}
.qty.big button{width:34px;height:34px}
.qty.big span{min-width:34px;text-align:center;font-size:13px}
.sheet-actions-stack .btn{justify-content:center}
.sheet-helper{
  padding:12px 14px;border-radius:14px;background:rgba(37,211,102,.07);
  border:1px solid rgba(37,211,102,.16);font-size:12px;color:var(--fg-2);line-height:1.55;
}
.sheet-helper strong{color:var(--fg)}
.sheet-spec-card,
.sheet-story-card,
.sheet-related{
  border-radius:18px;border:1px solid var(--line-soft);background:#fff;box-shadow:var(--sh-sm);
}
.sheet-spec-card{padding:18px 18px 12px}
.sheet-story-card{padding:18px}
.sheet-story-copy{font-size:14px;color:var(--fg-2);line-height:1.7;margin:10px 0 0}
.sheet-related{padding:18px;margin:12px 20px 26px}
.sheet-related-grid{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:12px;margin-top:16px}
.sheet-related-card{
  display:flex;flex-direction:column;gap:10px;text-align:left;border-radius:16px;padding:12px;
  border:1px solid var(--line-soft);background:linear-gradient(180deg,#fff 0%,#fbf7ef 100%);
  transition:transform .18s ease, box-shadow .18s ease, border-color .18s ease;
}
.sheet-related-card:hover{transform:translateY(-2px);border-color:rgba(139,90,62,.28);box-shadow:var(--sh)}
.sheet-related-media{border-radius:14px;overflow:hidden;background:var(--bg-1);aspect-ratio:1}
.sheet-related-media .img-stage::before{inset:10px;border-radius:12px}
.sheet-related-brand{font-family:var(--f-mono);font-size:9px;color:var(--fg-3);letter-spacing:.14em}
.sheet-related-name{font-family:var(--f-display);font-size:16px;line-height:1.2;color:var(--fg)}
.sheet-related-note{font-size:11.5px;color:var(--fg-2);line-height:1.45}
.sheet-actions{padding:0}
.pedido-saved{
  margin:0 0 12px;padding:13px 14px;border-radius:14px;border:1px solid rgba(37,211,102,.24);
  background:rgba(37,211,102,.08);display:flex;flex-direction:column;gap:8px;
}
.pedido-saved-head{display:flex;align-items:center;justify-content:space-between;gap:12px}
.pedido-saved-title{font-family:var(--f-display);font-size:18px;color:var(--fg)}
.pedido-saved-path{font-family:var(--f-mono);font-size:10px;letter-spacing:.08em;color:var(--fg-2);word-break:break-all}
.pedido-saved-actions{display:flex;gap:8px;flex-wrap:wrap}
@media (min-width: 900px){
  .sheet{max-width:1180px;margin:0 auto 18px;border-radius:28px;max-height:90vh}
  .sheet-layout{grid-template-columns:minmax(0,1.03fr) minmax(320px,.97fr);gap:22px;padding:0 22px 4px}
  .sheet-main{padding-bottom:6px}
  .sheet-buy-card{position:sticky;top:18px}
}
@media (max-width: 899px){
  .sheet-media-footer{grid-template-columns:1fr}
  .sheet-related-grid{grid-template-columns:repeat(2,minmax(0,1fr))}
  .sheet-price-box{grid-template-columns:1fr}
  .sheet-buy-top{flex-direction:column}
  .sheet-product-ref{text-align:left}
}
@media (max-width: 560px){
  .sheet-layout{padding:0 16px 6px}
  .sheet-related{margin:10px 16px 22px;padding:16px}
  .sheet-related-grid{grid-template-columns:1fr 1fr;gap:10px}
  .sheet-action-row{flex-direction:column}
  .sheet-action-row .qty.big,
  .sheet-action-row .btn{width:100%}
  .pedido-saved-head{flex-direction:column;align-items:flex-start}
}

/* ── DRAWERS ── */
.drawer-root{
  position:fixed;inset:0;z-index:40;
  background:rgba(28,24,18,.5);backdrop-filter:blur(4px);-webkit-backdrop-filter:blur(4px);
  pointer-events:none;opacity:0;transition:opacity .22s;
}
.drawer-root.on{pointer-events:all;opacity:1}
.drawer-root.left .drawer{left:0;right:auto;border-radius:0 20px 20px 0}
.drawer-root.right .drawer{right:0;left:auto;border-radius:20px 0 0 20px}
.drawer{
  position:absolute;top:0;bottom:0;width:min(340px,92vw);
  background:var(--bg-0);display:flex;flex-direction:column;
  transform:translateX(-100%);transition:transform .25s cubic-bezier(.22,.8,.2,1);
  border:1px solid var(--line-soft);
}
.drawer-root.left.on .drawer{transform:translateX(0)}
.drawer-root.right .drawer{transform:translateX(100%)}
.drawer-root.right.on .drawer{transform:translateX(0)}
.drawer-hdr{display:flex;align-items:center;justify-content:space-between;padding:18px 18px 14px;border-bottom:1px solid var(--line-soft);flex-shrink:0}
.drawer-title{font-family:var(--f-display);font-size:20px;font-weight:600}
.drawer-body{flex:1;overflow-y:auto;padding:18px}
.drawer-foot{padding:14px 18px 20px;border-top:1px solid var(--line-soft);flex-shrink:0}
.settings{display:flex;flex-direction:column;gap:24px}
.settings-block{display:flex;flex-direction:column;gap:12px}
.settings-kicker{font-family:var(--f-mono);font-size:9.5px;color:var(--fg-3);letter-spacing:.18em}
.toggle-row{display:flex;align-items:center;justify-content:space-between;gap:12px;cursor:pointer}
.toggle-title{font-size:14px;font-weight:500;color:var(--fg)}
.toggle-sub{font-size:12px;color:var(--fg-2);margin-top:2px}
.switch{width:44px;height:24px;border-radius:12px;background:var(--bg-2);border:1px solid var(--line);position:relative;flex-shrink:0;cursor:pointer;transition:all .2s}
.switch.on{background:var(--accent);border-color:var(--accent)}
.switch-dot{position:absolute;top:3px;left:3px;width:16px;height:16px;border-radius:50%;background:#FAF8F4;transition:transform .2s;box-shadow:0 1px 3px rgba(0,0,0,.2)}
.switch.on .switch-dot{transform:translateX(20px)}
.seg{display:flex;gap:6px}
.seg-btn{flex:1;padding:8px 10px;border-radius:8px;font-size:12.5px;font-weight:500;background:var(--bg-1);color:var(--fg-2);border:1px solid var(--line-soft);cursor:pointer;transition:all .15s}
.seg-btn.on{background:var(--accent-soft);color:var(--accent);border-color:rgba(139,90,62,.3)}
.info-line{display:flex;justify-content:space-between;font-size:13px;padding:6px 0;border-bottom:1px solid var(--line-soft)}
.info-line .mono.dim{font-size:9.5px;letter-spacing:.12em;padding-top:1px}
.about-copy{font-size:13.5px;color:var(--fg-2);line-height:1.6;margin:0;font-style:italic}
.pedido-list{display:flex;flex-direction:column;gap:10px}
.pedido-item{display:flex;align-items:center;gap:12px;padding:12px;border-radius:10px;background:var(--bg-1);border:1px solid var(--line-soft)}
.pedido-img{width:52px;height:52px;border-radius:8px;overflow:hidden;flex-shrink:0;background:var(--bg-2);display:flex;align-items:center;justify-content:center}
.pedido-img .img-stage::before{inset:3px;border-radius:6px}
.pedido-item-body{flex:1;min-width:0}
.pedido-item-cat{font-family:var(--f-mono);font-size:9px;color:var(--fg-3);letter-spacing:.14em;margin-bottom:3px}
.pedido-item-name{font-family:var(--f-display);font-size:15px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.pedido-item-price{font-family:var(--f-mono);font-size:11.5px;color:var(--fg-2);margin-top:3px}
.pedido-controls{display:flex;flex-direction:column;align-items:center;gap:6px}
.qty{display:flex;align-items:center;gap:4px;background:var(--bg-0);border:1px solid var(--line);border-radius:7px;overflow:hidden}
.qty button{width:26px;height:26px;display:grid;place-items:center;color:var(--fg-2);border:none}
.qty button:hover{background:var(--bg-2);color:var(--fg)}
.qty span{font-family:var(--f-mono);font-size:12px;padding:0 4px;color:var(--fg)}
.remove{color:var(--fg-3);padding:4px;border-radius:6px;transition:all .15s;border:none;background:none}
.remove:hover{color:#c0392b;background:rgba(192,57,43,.08)}
.pedido-foot{display:flex;flex-direction:column;gap:8px}
.pedido-total{display:flex;justify-content:space-between;align-items:center;padding:10px 12px;background:var(--bg-1);border-radius:8px}
.pedido-total-val{font-family:var(--f-display);font-size:20px;font-weight:600}
.pedido-foot-btns{display:flex;gap:8px}
.quote-modal-root{
  position:fixed;inset:0;z-index:70;
  background:rgba(28,24,18,.58);backdrop-filter:blur(4px);-webkit-backdrop-filter:blur(4px);
  display:flex;align-items:center;justify-content:center;padding:16px;
}
.quote-modal{
  width:min(520px,96vw);background:var(--bg-0);border-radius:18px;
  border:1px solid var(--line-soft);box-shadow:var(--sh-lg);overflow:hidden;
}
.quote-modal-head{
  display:flex;align-items:center;justify-content:space-between;
  padding:14px 16px;border-bottom:1px solid var(--line-soft);
}
.quote-modal-title{font-family:var(--f-display);font-size:24px;font-weight:600;letter-spacing:-.01em}
.quote-modal-body{padding:16px;display:flex;flex-direction:column;gap:12px}
.quote-form-row{display:flex;flex-direction:column;gap:6px}
.quote-form-label{font-size:12px;font-weight:600;color:var(--fg-2);letter-spacing:.05em;text-transform:uppercase}
.quote-form-input{
  width:100%;padding:11px 12px;border-radius:10px;border:1px solid var(--line);
  background:#fff;color:var(--fg);font-size:14px;outline:none;transition:border-color .15s, box-shadow .15s;
}
.quote-form-input:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(139,90,62,.12)}
.quote-form-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.quote-form-note{font-size:12px;color:var(--fg-2);line-height:1.5}
.quote-form-error{
  font-size:12px;color:#a33226;background:rgba(163,50,38,.08);
  border:1px solid rgba(163,50,38,.18);padding:8px 10px;border-radius:8px;
}
.quote-modal-actions{display:flex;gap:8px;padding:0 16px 16px}
.quote-modal-actions .btn{flex:1;justify-content:center}

/* ── WhatsApp FLOAT ── */
.wa-float{
  position:fixed;bottom:22px;left:22px;z-index:45;
  display:flex;align-items:center;gap:9px;
  background:var(--wa);color:#fff;
  padding:13px 18px;border-radius:999px;
  box-shadow:0 4px 20px rgba(37,211,102,.35),0 2px 8px rgba(0,0,0,.12);
  cursor:pointer;border:none;font-family:var(--f-ui);
  font-size:13.5px;font-weight:600;text-decoration:none;
  transition:all .2s;animation:floatIn .4s .5s cubic-bezier(.22,.8,.2,1) both;
}
@keyframes floatIn{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
.wa-float:hover{background:var(--wa-dark);transform:translateY(-2px);box-shadow:0 6px 24px rgba(37,211,102,.4)}
@media(max-width:480px){.wa-float span{display:none}.wa-float{padding:13px;border-radius:50%}}

/* ── FAB ── */
.fab{
  position:fixed;bottom:22px;right:22px;z-index:44;
  display:flex;align-items:center;gap:8px;
  background:var(--fg);color:var(--bg-0);
  padding:12px 18px;border-radius:999px;
  box-shadow:var(--sh-lg);cursor:pointer;border:none;
  font-family:var(--f-ui);font-size:13px;font-weight:600;transition:all .18s;
}
.fab:hover{transform:translateY(-1px)}

/* ── TOAST ── */
.flash{
  position:fixed;bottom:90px;left:50%;transform:translateX(-50%);
  background:var(--fg);color:var(--bg-0);
  font-family:var(--f-mono);font-size:11.5px;letter-spacing:.06em;
  padding:9px 18px;border-radius:999px;box-shadow:var(--sh-lg);
  z-index:60;pointer-events:none;
  animation:fadeIn .18s ease,fadeOut .18s 1.5s ease forwards;
}
@keyframes fadeOut{to{opacity:0;transform:translateX(-50%) translateY(6px)}}

/* ── PLACEHOLDER ── */
.ph-root{
  width:100%;height:100%;min-height:80px;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:8px;padding:10px;background:var(--bg-1);user-select:none;pointer-events:none;
}
.ph-icon{opacity:.2}
.ph-label{font-family:var(--f-display);font-size:12px;font-style:italic;color:var(--fg-2);opacity:.65;text-align:center;line-height:1.3}
.ph-sub{font-family:var(--f-mono);font-size:9px;letter-spacing:.14em;color:var(--fg-3);opacity:.55}

/* ── RESPONSIVE ── */
@media(max-width:900px){
  .mega-panel{grid-template-columns:1fr 1fr;gap:18px;position:absolute}
  .mega-spot{grid-column:1/-1;min-height:unset}
  .cats-grid{grid-template-columns:repeat(3,1fr)}
  .featured-grid{grid-template-columns:repeat(3,1fr)}
  .grid.density-large{grid-template-columns:repeat(2,1fr)}
  .grid.density-medium{grid-template-columns:repeat(3,1fr)}
  .ws-cards{grid-template-columns:repeat(2,1fr)}
}
@media(max-width:640px){
  .mega-panel{grid-template-columns:1fr;gap:16px;padding:18px 14px 16px;position:fixed;left:0;right:0;top:auto;border-radius:0 0 var(--r-xl) var(--r-xl)}
  .mega-top{padding:14px 14px}
  .mega-spot-name{font-size:24px}
  .home{padding:14px 14px 32px;gap:44px}
  .hero{padding:40px 22px 28px}
  .hero-title{font-size:clamp(38px,10vw,52px)}
  .hero-stats{gap:10px}
  .cats-grid{grid-template-columns:repeat(2,1fr);gap:10px}
  .featured-grid{grid-template-columns:repeat(2,1fr);gap:10px}
  .grid.density-large{grid-template-columns:repeat(2,1fr);gap:12px}
  .grid.density-medium{grid-template-columns:repeat(2,1fr);gap:10px}
  .ws-cards{grid-template-columns:1fr;gap:10px}
  .wholesale{padding:32px 22px}
  .cat-hdr{flex-direction:column;align-items:flex-start;gap:4px}
  .top{padding:11px 14px}
  .menu-row,.chips-row,.cat-search-bar,.cat-hdr,.grid{padding-left:14px;padding-right:14px}
  .card-body{padding:11px 12px 12px}
  .card-name{font-size:16px}
  .card-tag{font-size:11.5px}
  .quote-form-grid{grid-template-columns:1fr}
}
@media(max-width:400px){
  .cats-grid{grid-template-columns:1fr 1fr;gap:8px}
  .featured-grid{grid-template-columns:1fr 1fr}
  .cat-card{padding:16px 12px 14px}
}

<div id="root"></div>
<script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js" crossorigin="anonymous" referrerpolicy="no-referrer"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script type="text/babel">
/* ═══════════════════════════════════════════════════════
   PERFUMERÍA · Catálogo Mayorista 2026
   ← Edita BUSINESS / COPY / WA_TEMPLATES antes de publicar →
═══════════════════════════════════════════════════════ */
const BUSINESS = {
  brandName: 'PARFUM HOUSE',
  catalogBadge: 'CATALOGO MAYORISTA · 2026',
  whatsappNumber: '57XXXXXXXXXX',
  contactChannel: 'WhatsApp directo',
  schedule: 'Lun-Sab · 8am-6pm',
  minOrderPolicy: 'Consultar condiciones',
  aboutText: 'Distribucion mayorista de fragancias y perfumeria. Precios exclusivos para distribuidores, tiendas y revendedores.',
};

const COPY = {
  heroEyebrow: 'CATALOGO MAYORISTA · 2026',
  heroTitleTop: 'Fragancias para',
  heroTitleAccent: 'tu negocio.',
  heroSubtitle: 'Distribucion mayorista de perfumeria premium. Perfumes mujer, hombre, unisex, ninos, splash, corporales, sets y nicho arabe para distribuidores y revendedores.',
  heroCtaPrimary: 'Ver catalogo completo',
  heroCtaSecondary: 'Consulta mayorista',
  wsAdvisorCta: 'Hablar con un asesor',
  wsResponseNote: 'Respuesta en menos de 24 h · Lun a Sab',
  footCatalogName: 'Catalogo Mayorista',
  footCatalogSub: 'Fragancias y Perfumeria · Distribucion',
  floatWaLabel: 'Pedir por WhatsApp',
  settingsWA: 'Pedidos por WhatsApp',
};

const WA_TEMPLATES = {
  catalogIntro: 'Hola, quiero informacion sobre el catalogo mayorista de fragancias.',
  catalogGreeting: 'Hola, me interesa el catalogo mayorista de fragancias. ¿Pueden enviarme informacion de distribucion?',
  distributorInfo: 'Hola, quiero informacion sobre condiciones mayoristas para distribuidores de fragancias.',
  productInquiry: (product, category) => `Hola, me interesa *${product.brand} ${product.name}* (${category}). ¿Pueden darme informacion sobre precios mayoristas?`,
};

const waLink = (msg) => `https://wa.me/${BUSINESS.whatsappNumber}?text=${encodeURIComponent(msg)}`;
const fmtCOP  = (n) => n ? '$' + n.toLocaleString('es-CO') : '—';
const normalizeFilePart = (txt='') => String(txt || '')
  .toLowerCase()
  .normalize('NFD').replace(/[\u0300-\u036f]/g,'')
  .replace(/[^a-z0-9]+/g,'_')
  .replace(/^_+|_+$/g,'')
  .slice(0,48);
const dateLabel = (d) => new Intl.DateTimeFormat('es-CO',{dateStyle:'medium',timeStyle:'short'}).format(d);
const dateStamp = (d) => {
  const x = d instanceof Date ? d : new Date(d);
  const yyyy = x.getFullYear();
  const mm = String(x.getMonth()+1).padStart(2,'0');
  const dd = String(x.getDate()).padStart(2,'0');
  const hh = String(x.getHours()).padStart(2,'0');
  const mi = String(x.getMinutes()).padStart(2,'0');
  return `${yyyy}-${mm}-${dd}_${hh}-${mi}`;
};
const buildQuoteFileName = (clientName, createdAt) => {
  const safeName = normalizeFilePart(clientName) || 'cliente';
  return `cotizacion_${safeName}_${dateStamp(createdAt)}.pdf`;
};
const arrayBufferToBase64 = (arrBuffer) => {
  const bytes = new Uint8Array(arrBuffer);
  let binary = '';
  const chunk = 0x8000;
  for (let i=0; i<bytes.length; i+=chunk) {
    const slice = bytes.subarray(i, i + chunk);
    binary += String.fromCharCode.apply(null, slice);
  }
  return btoa(binary);
};

const PDF_CATEGORY_META = {
  mujer:   { label:'Perfumes Mujer', color:[203,193,178] },
  hombre:  { label:'Perfumes Hombre', color:[195,186,170] },
  unisex:  { label:'Perfumes Unisex', color:[194,185,176] },
  splash:  { label:'Splash / Body Mist', color:[215,201,186] },
  corporal:{ label:'Corporal', color:[214,204,191] },
  sets:    { label:'Sets', color:[205,193,180] },
  ninos:   { label:'Niños', color:[217,206,191] },
  nicho:   { label:'Nicho / Árabe', color:[196,183,168] },
  mini:    { label:'Mini / Travel', color:[210,198,184] },
};
const PDF_GROUP_ORDER = ['mujer','hombre','unisex','splash','corporal','sets','ninos','nicho','mini'];
const groupItemsForPdf = (items) => {
  const buckets = new Map();
  PDF_GROUP_ORDER.forEach(id => buckets.set(id, []));
  items.forEach(item => {
    const key = PDF_CATEGORY_META[item.cat] ? item.cat : 'unisex';
    if (!buckets.has(key)) buckets.set(key, []);
    buckets.get(key).push(item);
  });
  return PDF_GROUP_ORDER
    .map(id => ({
      id,
      ...PDF_CATEGORY_META[id],
      items: buckets.get(id) || [],
      subtotal: (buckets.get(id) || []).reduce((sum, item) => sum + Number(item.price || 0) * Number(item.qty || 1), 0),
    }))
    .filter(group => group.items.length);
};
const pdfImageCache = new Map();
const loadImageElement = (src) => new Promise((resolve, reject) => {
  const img = new Image();
  img.crossOrigin = 'anonymous';
  img.onload = () => resolve(img);
  img.onerror = reject;
  img.src = src;
});
const getProductPdfThumb = async (product) => {
  const key = String(product?.id || '').toUpperCase();
  if (pdfImageCache.has(key)) return pdfImageCache.get(key);
  for (const src of buildImgSources(product)) {
    try {
      const img = await loadImageElement(src);
      const canvas = document.createElement('canvas');
      canvas.width = 110;
      canvas.height = 110;
      const ctx = canvas.getContext('2d');
      ctx.fillStyle = '#ffffff';
      ctx.fillRect(0, 0, 110, 110);
      ctx.fillStyle = '#f4eee5';
      ctx.fillRect(6, 6, 98, 98);
      const ratio = Math.min(74 / img.width, 74 / img.height);
      const w = img.width * ratio;
      const h = img.height * ratio;
      const x = (110 - w) / 2;
      const y = (110 - h) / 2;
      ctx.save();
      ctx.shadowColor = 'rgba(36, 25, 16, 0.14)';
      ctx.shadowBlur = 14;
      ctx.shadowOffsetY = 8;
      ctx.drawImage(img, x, y, w, h);
      ctx.restore();
      const dataUrl = canvas.toDataURL('image/jpeg', 0.92);
      pdfImageCache.set(key, dataUrl);
      return dataUrl;
    } catch (err) {}
  }
  pdfImageCache.set(key, null);
  return null;
};
const createQuotePdfBuffer = async ({items, client, showPrice, createdAt}) => {
  const jspdfNs = window.jspdf;
  if (!jspdfNs || !jspdfNs.jsPDF) throw new Error('No se pudo cargar el motor PDF (jsPDF).');
  const { jsPDF } = jspdfNs;
  const doc = new jsPDF({ unit:'pt', format:'a4' });
  const pageW = doc.internal.pageSize.getWidth();
  const pageH = doc.internal.pageSize.getHeight();
  const margin = 34;
  const contentW = pageW - margin * 2;
  const right = pageW - margin;
  const dateText = dateLabel(createdAt);
  const groups = groupItemsForPdf(items);
  const total = groups.reduce((sum, group) => sum + group.subtotal, 0);
  let page = 1;
  let y = 0;

  const drawFooter = () => {
    doc.setDrawColor(227, 219, 207);
    doc.line(margin, pageH - 42, right, pageH - 42);
    doc.setFont('helvetica', 'normal');
    doc.setFontSize(8.8);
    doc.setTextColor(129, 118, 101);
    doc.text('Valores sujetos a disponibilidad, lista mayorista y condiciones comerciales vigentes.', margin, pageH - 24);
    doc.text(`Pág. ${page}`, right, pageH - 24, { align:'right' });
  };

  const startPage = ({ first=false } = {}) => {
    doc.setFillColor(248, 244, 236);
    doc.rect(0, 0, pageW, pageH, 'F');
    doc.setFillColor(33, 27, 20);
    doc.rect(0, 0, pageW, 16, 'F');
    doc.setFillColor(255, 255, 255);
    doc.roundedRect(margin, 28, contentW, first ? 104 : 72, 18, 18, 'F');
    doc.setDrawColor(226, 216, 203);
    doc.roundedRect(margin, 28, contentW, first ? 104 : 72, 18, 18, 'S');

    doc.setFont('times', 'bold');
    doc.setTextColor(34, 28, 21);
    doc.setFontSize(first ? 26 : 22);
    doc.text(BUSINESS.brandName, margin + 18, 58);
    doc.setFont('helvetica', 'normal');
    doc.setFontSize(10.5);
    doc.setTextColor(120, 108, 92);
    doc.text('Cotización mayorista agrupada por categorías', margin + 18, 76);
    doc.text(BUSINESS.tagline || 'Fragancias premium para distribuidores', margin + 18, 92);

    doc.setFont('helvetica', 'bold');
    doc.setFontSize(10);
    doc.setTextColor(82, 69, 52);
    doc.text('Fecha', right - 142, 54);
    doc.text('Cliente', right - 142, 76);
    doc.text('Ciudad', right - 142, 98);
    doc.setFont('helvetica', 'normal');
    doc.text(dateText, right - 18, 54, { align:'right' });
    doc.text(client.name || 'Cliente', right - 18, 76, { align:'right' });
    doc.text(client.city || 'No informada', right - 18, 98, { align:'right' });

    if (first) {
      doc.setFillColor(245, 239, 231);
      doc.roundedRect(margin, 146, contentW, 54, 14, 14, 'F');
      doc.setDrawColor(223, 214, 200);
      doc.roundedRect(margin, 146, contentW, 54, 14, 14, 'S');
      doc.setFont('helvetica', 'bold');
      doc.setFontSize(10);
      doc.setTextColor(90, 75, 56);
      doc.text('Resumen del pedido', margin + 14, 165);
      doc.setFont('helvetica', 'normal');
      doc.setFontSize(9);
      doc.text(`${items.length} referencias · ${groups.length} categorías · Cotización mayorista`, margin + 14, 183);
      if (showPrice && total > 0) {
        doc.setFont('times', 'bold');
        doc.setFontSize(20);
        doc.setTextColor(139, 90, 62);
        doc.text(fmtCOP(total), right - 14, 183, { align:'right' });
      } else {
        doc.setFont('helvetica', 'bold');
        doc.setFontSize(10);
        doc.setTextColor(90, 75, 56);
        doc.text('Consultar lista mayorista', right - 14, 183, { align:'right' });
      }
      y = 224;
    } else {
      y = 120;
    }
  };

  const drawTableHeader = () => {
    doc.setFillColor(30, 25, 20);
    doc.roundedRect(margin, y, contentW, 24, 8, 8, 'F');
    doc.setFont('helvetica', 'bold');
    doc.setFontSize(8.5);
    doc.setTextColor(255, 255, 255);
    doc.text('#',           margin + 8,   y + 15);
    doc.text('Img',         margin + 26,  y + 15);
    doc.text('Ref',         margin + 72,  y + 15);
    doc.text('Producto',    margin + 118, y + 15);
    doc.text('Descripción', margin + 270, y + 15);
    doc.text('Cant.',       right - 140,  y + 15, { align:'right' });
    doc.text(showPrice ? 'P.Unit' : 'Precio',   right - 76, y + 15, { align:'right' });
    doc.text(showPrice ? 'Subtotal' : 'Estado',  right - 10, y + 15, { align:'right' });
    y += 34;
  };

  const drawGroupHeader = (group, continued=false) => {
    const [r,g,b] = group.color || [203,193,178];
    doc.setFillColor(r, g, b);
    doc.roundedRect(margin, y, contentW, 30, 12, 12, 'F');
    doc.setFont('helvetica', 'bold');
    doc.setFontSize(11);
    doc.setTextColor(44, 37, 29);
    doc.text(continued ? `${group.label.toUpperCase()} · CONTINÚA` : group.label.toUpperCase(), margin + 14, y + 19);
    doc.setFont('helvetica', 'normal');
    doc.setFontSize(10);
    doc.text(`${group.items.length} ref.`, right - 86, y + 19, { align:'right' });
    if (showPrice) {
      doc.setFont('helvetica', 'bold');
      doc.text(fmtCOP(group.subtotal), right - 14, y + 19, { align:'right' });
    }
    y += 40;
    drawTableHeader();
  };

  const ensureSpace = (needed, ctx={}) => {
    if (y + needed <= pageH - 60) return;
    drawFooter();
    doc.addPage();
    page += 1;
    startPage({ first:false });
    if (ctx.group) drawGroupHeader(ctx.group, true);
  };

  const getItemSummary = (item) => {
    const parts = [];
    if (item.tagline) parts.push(item.tagline);
    const sourceSpec = (item.specs || []).find(spec => /^Fuente:/i.test(spec));
    if (sourceSpec) parts.push(sourceSpec.replace(/^Fuente:\s*/i, ''));
    return parts.join(' · ');
  };

  startPage({ first:true });

  for (const group of groups) {
    ensureSpace(66);
    drawGroupHeader(group, false);
    let rowIndex = 0;
    for (const item of group.items) {
      const productLines = doc.splitTextToSize(`${item.brand} ${item.name}`, 146);
      const descLines = doc.splitTextToSize(getItemSummary(item) || 'Perfumería mayorista', 80);
      const rowHeight = Math.max(52, productLines.length * 12 + 20, descLines.length * 10 + 22);
      ensureSpace(rowHeight + 16, { group });
      const fill = rowIndex % 2 === 0 ? [255,255,255] : [248,244,238];
      doc.setFillColor(fill[0], fill[1], fill[2]);
      doc.roundedRect(margin, y, contentW, rowHeight, 12, 12, 'F');
      doc.setDrawColor(233, 225, 214);
      doc.roundedRect(margin, y, contentW, rowHeight, 12, 12, 'S');

      doc.setFont('helvetica', 'normal');
      doc.setFontSize(9);
      doc.setTextColor(60, 52, 42);
      doc.text(String(rowIndex + 1), margin + 8, y + 20);

      const imgData = await getProductPdfThumb(item);
      const thumbX = margin + 28;
      const thumbY = y + 10;
      doc.setFillColor(255, 255, 255);
      doc.roundedRect(thumbX, thumbY, 40, 40, 10, 10, 'F');
      doc.setDrawColor(227, 217, 204);
      doc.roundedRect(thumbX, thumbY, 40, 40, 10, 10, 'S');
      if (imgData) {
        try { doc.addImage(imgData, 'JPEG', thumbX + 3, thumbY + 3, 34, 34); } catch (err) {}
      }

      doc.setFont('helvetica', 'bold');
      doc.setFontSize(9.4);
      doc.setTextColor(39, 33, 26);
      doc.text(String(item.id || '').toUpperCase(), margin + 74, y + 20);

      doc.setFont('times', 'bold');
      doc.setFontSize(11.2);
      doc.setTextColor(42, 35, 27);
      doc.text(productLines, margin + 118, y + 18);

      doc.setFont('helvetica', 'normal');
      doc.setFontSize(8.2);
      doc.setTextColor(103, 91, 77);
      doc.text(descLines, margin + 270, y + 18);

      doc.setFont('helvetica', 'bold');
      doc.setFontSize(9);
      doc.setTextColor(42, 35, 27);
      doc.text(String(item.qty || 1), right - 140, y + 20, { align:'right' });
      if (showPrice) {
        const unit = Number(item.price || 0);
        const subtotal = unit * Number(item.qty || 1);
        doc.text(unit > 0 ? fmtCOP(unit) : 'Cotizar', right - 76, y + 20, { align:'right' });
        doc.text(subtotal > 0 ? fmtCOP(subtotal) : 'Cotizar', right - 10, y + 20, { align:'right' });
      } else {
        doc.text('Consultar', right - 76, y + 20, { align:'right' });
        doc.text('—', right - 10, y + 20, { align:'right' });
      }
      y += rowHeight + 8;
      rowIndex += 1;
    }

    ensureSpace(28);
    doc.setFillColor(245, 239, 231);
    doc.roundedRect(margin, y, contentW, 24, 10, 10, 'F');
    doc.setFont('helvetica', 'bold');
    doc.setFontSize(10);
    doc.setTextColor(58, 49, 38);
    doc.text(`Subtotal ${group.label}`, right - 118, y + 16, { align:'right' });
    if (showPrice) doc.text(fmtCOP(group.subtotal), right - 12, y + 16, { align:'right' });
    else doc.text('Consultar', right - 12, y + 16, { align:'right' });
    y += 38;
  }

  ensureSpace(76);
  doc.setFillColor(255, 255, 255);
  doc.roundedRect(margin, y, contentW, 62, 16, 16, 'F');
  doc.setDrawColor(226, 216, 203);
  doc.roundedRect(margin, y, contentW, 62, 16, 16, 'S');
  doc.setFont('helvetica', 'bold');
  doc.setFontSize(10);
  doc.setTextColor(92, 76, 57);
  doc.text('CIERRE DE COTIZACIÓN', margin + 14, y + 20);
  doc.setFont('helvetica', 'normal');
  doc.setFontSize(10);
  doc.setFont('helvetica', 'normal');
  doc.setFontSize(9.5);
  doc.setTextColor(92, 76, 57);
  doc.text(`${items.length} referencias · ${groups.length} categorías`, margin + 14, y + 40);
  if (showPrice && total > 0) {
    doc.setFont('times', 'bold');
    doc.setFontSize(22);
    doc.setTextColor(139, 90, 62);
    doc.text(fmtCOP(total), right - 16, y + 40, { align:'right' });
  } else {
    doc.setFont('helvetica', 'bold');
    doc.setFontSize(10);
    doc.setTextColor(92, 76, 57);
    doc.text('Consultar lista mayorista', right - 16, y + 40, { align:'right' });
  }

  drawFooter();
  return doc.output('arraybuffer');
};

const saveQuoteRecord = async ({fileName, pdfBase64, payload}) => {
  if (window.location.protocol === 'file:') {
    throw new Error('El catalogo esta abierto como archivo local. Abre desde servidor: node server-catalogo.js');
  }
  let resp = null;
  try {
    resp = await fetch('/api/guardar-pdf', {
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body: JSON.stringify({ fileName, pdfBase64, payload }),
    });
  } catch (err) {
    throw new Error('No hay conexion con el servidor de cotizaciones. Inicia: node server-catalogo.js');
  }
  const text = await resp.text();
  let json = {};
  try { json = text ? JSON.parse(text) : {}; } catch {}
  if (!resp.ok || !json.ok) {
    if (resp.status === 404) {
      throw new Error('Este servidor no tiene API de guardado PDF. Usa: node server-catalogo.js');
    }
    throw new Error(json.error || `No se pudo guardar PDF (${resp.status})`);
  }
  return json;
};
const IMG_BASE = 'pack_data/perfumeria_investigacion_pack/images_placeholders/';
const IMG_FALLBACK_BASE = './pack_data/perfumeria_investigacion_pack/images_placeholders/';
const REAL_IMG_BASE = 'images_real/';
const REAL_IMG_EXTENSIONS = ['jpg','jpeg','png','webp','avif'];

const buildImgSources = (product) => {
  const ref = String(product?.id || '').toUpperCase();
  const placeholderFile = (typeof PLACEHOLDER_BY_ID !== 'undefined' && PLACEHOLDER_BY_ID[ref]) ? PLACEHOLDER_BY_ID[ref] : '';
  const imgPath = product?.img || (placeholderFile ? IMG_BASE + placeholderFile : '');
  if (!imgPath && !ref) return [];
  const normalized = imgPath ? String(imgPath).replace(/\\/g, '/').replace(/^\.\//, '') : '';
  const fileName = normalized ? normalized.split('/').pop() : placeholderFile;
  const realByRef = ref
    ? REAL_IMG_EXTENSIONS.flatMap(ext => [
        `${REAL_IMG_BASE}${ref}.${ext}`,
        `./${REAL_IMG_BASE}${ref}.${ext}`,
        `/${REAL_IMG_BASE}${ref}.${ext}`,
      ])
    : [];
  return [...new Set([
    ...realByRef,
    normalized,
    './' + normalized,
    '/' + normalized,
    fileName ? IMG_BASE + fileName : '',
    fileName ? IMG_FALLBACK_BASE + fileName : '',
    fileName ? '/' + IMG_BASE + fileName : '',
  ].filter(Boolean))];
};

const ProductVisual = ({product, tall, compact, surface='catalog'}) => {
  const cat = CATEGORIES.find(c => c.id === product.cat);
  const sources = React.useMemo(() => buildImgSources(product), [product.id, product.img]);
  const [srcIndex, setSrcIndex] = React.useState(0);

  React.useEffect(() => {
    setSrcIndex(0);
  }, [product.id, product.img]);

  const src = sources[srcIndex];
  const classes = `img-stage ${compact ? 'compact' : ''} ${tall ? 'tall' : ''} surface-${surface}`.trim();

  if (src && srcIndex <= sources.length - 1) {
    return (
      <div className={classes}>
        <img
          src={src}
          alt={product.name}
          className="prod-photo"
          loading="lazy"
          decoding="async"
          onError={() => setSrcIndex(i => (i < sources.length - 1 ? i + 1 : sources.length))}
        />
      </div>
    );
  }

  return (
    <div className={classes}>
      <Placeholder label={product.name} sub={cat?.short} tall={tall} compact={compact}/>
    </div>
  );
};

const specValue = (product, label) => {
  const raw = (product?.specs || []).find(s => String(s).toLowerCase().startsWith(String(label).toLowerCase()));
  return raw ? raw.split(':').slice(1).join(':').trim() : '';
};
const productVolume = (product) => {
  const text = [product?.name || '', product?.tagline || '', ...(product?.specs || [])].join(' ');
  const match = text.match(/(\d+(?:[.,]\d+)?\s?(?:ml|oz))/i);
  return match ? match[1].replace(/\s+/g, ' ').toUpperCase() : 'Referencia';
};
const productRelated = (product) => (
  PRODUCTS
    .filter(p => p.id !== product.id && (p.cat === product.cat || p.brand === product.brand))
    .slice(0, 4)
);

const PedidoDrawer = ({open, onClose, items, setItems, showPrice, showToast}) => {
  const total  = items.reduce((s,it)=>s+(it.price||0)*it.qty, 0);
  const [formOpen, setFormOpen] = React.useState(false);
  const [saving, setSaving] = React.useState(false);
  const [formError, setFormError] = React.useState('');
  const [lastSavedQuote, setLastSavedQuote] = React.useState(null);
  const [client, setClient] = React.useState({ name:'', phone:'', city:'' });

  const chQty  = (id,d) => setItems(items.map(it=>it.id===id?{...it,qty:Math.max(1,it.qty+d)}:it));
  const remove = (id)   => setItems(items.filter(it=>it.id!==id));
  const clear  = ()     => setItems([]);

  React.useEffect(() => {
    if (!open) {
      setFormOpen(false);
      setSaving(false);
      setFormError('');
      setLastSavedQuote(null);
    }
  }, [open]);

  const buildMsg = (savedClient, savedFileName) => {
    let m = '*Pedido Mayorista - Fragancias*\n\n';
    m += 'Cliente: ' + savedClient.name + '\n';
    if (savedClient.phone) m += 'Telefono: ' + savedClient.phone + '\n';
    if (savedClient.city) m += 'Ciudad: ' + savedClient.city + '\n';
    if (savedFileName) m += 'Soporte PDF: ' + savedFileName + '\n';
    m += '\n';
    items.forEach((it,i)=>{
      const cat=CATEGORIES.find(c=>c.id===it.cat);
      m += String(i+1).padStart(2,'0') + '. ' + it.brand + ' ' + it.name + ' (' + cat.short + ') x ' + it.qty;
      if(showPrice && it.price) m += ' - ' + fmtCOP(it.price*it.qty);
      m += '\n';
    });
    if(showPrice && total) m += '\n*TOTAL EST.:* ' + fmtCOP(total);
    m += '\n\n¿Pueden confirmar disponibilidad y condiciones mayoristas?';
    return m;
  };

  const openClientForm = () => {
    setFormError('');
    setFormOpen(true);
  };

  const handleGenerateAndSend = async () => {
    const cleanName = String(client.name || '').trim();
    if (!cleanName) {
      setFormError('El nombre del cliente es obligatorio.');
      return;
    }
    if (!items.length) {
      setFormError('No hay productos en el pedido.');
      return;
    }

    setSaving(true);
    setFormError('');
    try {
      const createdAt = new Date();
      const fileName = buildQuoteFileName(cleanName, createdAt);
      const payload = {
        business: BUSINESS,
        showPrice,
        createdAt: createdAt.toISOString(),
        client: {
          name: cleanName,
          phone: String(client.phone || '').trim(),
          city: String(client.city || '').trim(),
        },
        items: items.map(it => ({
          id: String(it.id || '').toUpperCase(),
          brand: it.brand,
          name: it.name,
          category: (CATEGORIES.find(c=>c.id===it.cat)?.name || it.cat),
          qty: Number(it.qty || 1),
          unitPrice: Number(it.price || 0),
          subtotal: Number(it.price || 0) * Number(it.qty || 1),
        })),
        total: showPrice ? total : null,
      };
      const pdfBuffer = await createQuotePdfBuffer({
        items,
        client: payload.client,
        showPrice,
        createdAt,
      });
      const pdfBase64 = arrayBufferToBase64(pdfBuffer);
      const saved = await saveQuoteRecord({ fileName, pdfBase64, payload });

      setFormOpen(false);
      setLastSavedQuote(saved);
      if (showToast) showToast('PDF guardado: ' + (saved.fileName || fileName));

      const message = buildMsg(payload.client, saved.fileName || fileName);
      window.open(waLink(message), '_blank', 'noopener,noreferrer');
    } catch (err) {
      setFormError(err?.message || 'No se pudo generar y guardar la cotizacion PDF.');
    } finally {
      setSaving(false);
    }
  };

  return (
    <>
      <Drawer open={open} side="right" onClose={onClose}
        title={'Mi Pedido · ' + items.length}
        footer={items.length>0 && (
          <div className="pedido-foot">
            {showPrice && total>0 && (
              <div className="pedido-total">
                <span className="mono muted tiny">TOTAL EST.</span>
                <span className="pedido-total-val serif">{fmtCOP(total)}</span>
              </div>
            )}
            <div className="pedido-foot-btns">
              <button className="btn whatsapp flex" onClick={openClientForm}>
                <IconWhatsapp size={15}/> Generar PDF + WhatsApp
              </button>
            </div>
            <button className="btn ghost sm" style={{width:'100%',marginTop:6,justifyContent:'center',color:'var(--fg-3)'}} onClick={clear}>
              <IconTrash size={13}/> Vaciar pedido
            </button>
          </div>
        )}>
        {lastSavedQuote && (
        <div className="pedido-saved">
          <div className="pedido-saved-head">
            <div>
              <div className="pedido-saved-title serif">Cotización guardada</div>
              <div className="muted">Se generó el PDF antes de abrir WhatsApp.</div>
            </div>
            <div className="pedido-saved-actions">
              <a className="btn solid sm" href={'/' + String(lastSavedQuote.pdfPath || '').replace(/^\/+/, '')} target="_blank" rel="noreferrer">Abrir PDF</a>
              <a className="btn ghost sm" href={'/' + String(lastSavedQuote.metaPath || '').replace(/^\/+/, '')} target="_blank" rel="noreferrer">Ver metadata</a>
            </div>
          </div>
          <div className="pedido-saved-path">PDF: {lastSavedQuote.pdfPath}</div>
          <div className="pedido-saved-path">Meta: {lastSavedQuote.metaPath}</div>
        </div>
      )}

      {items.length===0 ? (
          <div className="empty" style={{padding:'40px 12px'}}>
            <div className="empty-mono mono">// PEDIDO VACIO</div>
            <div className="empty-title serif">Arma tu pedido</div>
            <div className="empty-sub">Agrega referencias con el boton + y luego genera la cotizacion.</div>
          </div>
        ) : (
          <div className="pedido-list">
            {items.map(it => {
              const cat=CATEGORIES.find(c=>c.id===it.cat);
              return (
                <div className="pedido-item" key={it.id}>
                  <div className="pedido-img">
                    <PedidoThumb item={it}/>
                  </div>
                  <div className="pedido-item-body">
                    <div className="pedido-item-cat mono">{cat.short}</div>
                    <div className="pedido-item-name serif">{it.brand} {it.name}</div>
                    {showPrice && it.price>0 && <div className="pedido-item-price mono">{fmtCOP(it.price)} <span className="dim">x {it.qty}</span></div>}
                  </div>
                  <div className="pedido-controls">
                    <div className="qty">
                      <button onClick={()=>chQty(it.id,-1)}><IconMinus size={11}/></button>
                      <span className="mono">{it.qty}</span>
                      <button onClick={()=>chQty(it.id, 1)}><IconPlus  size={11}/></button>
                    </div>
                    <button className="remove" onClick={()=>remove(it.id)}><IconTrash size={13}/></button>
                  </div>
                </div>
              );
            })}
          </div>
        )}
      </Drawer>

      {formOpen && (
        <div className="quote-modal-root" onClick={() => !saving && setFormOpen(false)}>
          <div className="quote-modal" onClick={e=>e.stopPropagation()}>
            <div className="quote-modal-head">
              <div className="quote-modal-title serif">Datos para cotizacion</div>
              <button className="icon-btn" onClick={() => !saving && setFormOpen(false)}>
                <IconClose size={15}/>
              </button>
            </div>
            <div className="quote-modal-body">
              <div className="quote-form-row">
                <label className="quote-form-label">Nombre del cliente *</label>
                <input
                  className="quote-form-input"
                  value={client.name}
                  onChange={e=>setClient({...client,name:e.target.value})}
                  placeholder="Ej: Maria Lopez"
                  autoFocus
                  disabled={saving}
                />
              </div>
              <div className="quote-form-grid">
                <div className="quote-form-row">
                  <label className="quote-form-label">Telefono</label>
                  <input
                    className="quote-form-input"
                    value={client.phone}
                    onChange={e=>setClient({...client,phone:e.target.value})}
                    placeholder="Ej: 3001234567"
                    disabled={saving}
                  />
                </div>
                <div className="quote-form-row">
                  <label className="quote-form-label">Ciudad</label>
                  <input
                    className="quote-form-input"
                    value={client.city}
                    onChange={e=>setClient({...client,city:e.target.value})}
                    placeholder="Ej: Bogota"
                    disabled={saving}
                  />
                </div>
              </div>
              <div className="quote-form-note">
                Se generara y guardara un PDF de la cotizacion antes de abrir WhatsApp.
              </div>
              {formError && <div className="quote-form-error">{formError}</div>}
            </div>
            <div className="quote-modal-actions">
              <button className="btn ghost" onClick={() => !saving && setFormOpen(false)} disabled={saving}>Cancelar</button>
              <button className="btn whatsapp" onClick={handleGenerateAndSend} disabled={saving}>
                {saving ? 'Generando PDF...' : 'Guardar PDF y continuar'}
              </button>
            </div>
          </div>
        </div>
      )}
    </>
  );
};

const MegaMenu = ({onNavigate}) => {
  const [active, setActive]   = React.useState(MEGA_MENU_SECTIONS[0].id);
  const [open,   setOpen]     = React.useState(false);
  const closeTimer            = React.useRef(null);

  const section       = MEGA_MENU_SECTIONS.find(x => x.id === active) || MEGA_MENU_SECTIONS[0];
  const spotlight     = PRODUCTS.find(p => p.id === section.spotlight) || PRODUCTS.find(p => p.cat === section.category);
  const spotlightCat  = spotlight ? (CATEGORIES.find(c => c.id === spotlight.cat)?.name || section.label) : section.label;

  const openFor = (id) => { clearTimeout(closeTimer.current); setActive(id); setOpen(true); };
  const scheduleClose = () => { closeTimer.current = setTimeout(() => setOpen(false), 140); };
  const cancelClose   = () => clearTimeout(closeTimer.current);

  const handleTabClick = (id) => {
    if (open && active === id) { setOpen(false); }
    else { openFor(id); }
  };

  return (
    <section>
      <div className="sec-head">
        <div className="sec-kicker mono">/ 01 — NAVEGA POR CATEGORÍA</div>
        <h2 className="sec-title">Explora el <em>catálogo</em></h2>
      </div>
      <div className={`mega-shell${open ? ' open' : ''}`}
           onMouseLeave={scheduleClose}
           onMouseEnter={cancelClose}>
        <div className="mega-top">
          {MEGA_MENU_SECTIONS.map(item => (
            <button
              key={item.id}
              className={"mega-tab " + (open && active===item.id ? 'on' : '')}
              onMouseEnter={() => openFor(item.id)}
              onClick={() => handleTabClick(item.id)}
            >
              {item.label}
            </button>
          ))}
          <span className="mega-top-hint">{open ? 'ESC para cerrar' : 'Pasa el cursor o toca para explorar'}</span>
        </div>

        {open && (
          <div className="mega-panel" onMouseEnter={cancelClose}>
            {section.columns.map((col, idx) => (
              <div className="mega-col" key={idx}>
                <div className="mega-col-title">{col.title}</div>
                {col.links.map((label, i) => (
                  <button key={i} className="mega-link"
                          onClick={() => { setOpen(false); onNavigate(section.category); }}>
                    {label}
                  </button>
                ))}
              </div>
            ))}
            <div className="mega-spot">
              <div>
                <div className="mega-spot-media">
                  {spotlight ? <ProductVisual product={spotlight} surface="featured" tall/> : null}
                </div>
                <div className="mega-spot-kicker">PERFUME DESTACADO</div>
                <div className="mega-spot-name serif">{spotlight ? `${spotlight.brand} ${spotlight.name}` : section.label}</div>
                <div className="mega-spot-copy">{spotlight ? spotlight.tagline : 'Explora esta colección con filtros listos para compra mayorista.'}</div>
              </div>
              <div>
                <div className="mega-spot-price">Colección: <strong>{spotlightCat}</strong></div>
                <button className="btn primary mega-spot-cta"
                        onClick={() => { setOpen(false); onNavigate(section.category); }}>
                  Ver colección <IconArrow size={14}/>
                </button>
              </div>
            </div>
          </div>
        )}
      </div>
    </section>
  );
};
